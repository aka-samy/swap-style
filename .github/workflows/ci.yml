name: CI

on:
  push:
    branches: [main, '001-swap-style-app']
  pull_request:
    branches: [main]

jobs:
  api-lint-test:
    name: API - Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: swapstyle_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        working-directory: api
        run: npm ci

      - name: Lint
        working-directory: api
        run: npm run lint

      - name: Generate Prisma client
        working-directory: api
        run: npx prisma generate

      - name: Run migrations
        working-directory: api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/swapstyle_test?schema=public
        run: npx prisma migrate deploy

      - name: Test with coverage
        working-directory: api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/swapstyle_test?schema=public
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          NODE_ENV: test
        run: npm run test:cov

  mobile-lint-test:
    name: Mobile - Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Analyze
        working-directory: mobile
        run: flutter analyze

      - name: Test with coverage
        working-directory: mobile
        run: flutter test --coverage
