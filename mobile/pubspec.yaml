name: swap_style
description: Swap Style - Community Clothing Swap Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.0.0
  flutter: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.0
  riverpod_annotation: ^2.6.0

  # Networking
  dio: ^5.7.0

  # Navigation
  go_router: ^14.0.0

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  firebase_messaging: ^15.0.0
  google_sign_in: ^6.2.1

  # UI
  appinio_swiper: ^2.1.1
  cached_network_image: ^3.4.0
  image_picker: ^1.1.0

  # Real-time
  socket_io_client: ^3.0.0

  # Code generation
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0

  # Utils
  intl: ^0.20.2
  geolocator: ^13.0.0
  shared_preferences: ^2.3.0
  google_fonts: ^8.1.0
  flutter_launcher_icons: ^0.14.4
  firebase_crashlytics: ^4.3.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.0
  mocktail: ^1.0.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  adaptive_icon_background: "#090A0F"
  adaptive_icon_foreground: "assets/icon.png"
